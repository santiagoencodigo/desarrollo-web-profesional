<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8" />
        <title>Mokepon - Santiagoencodigo</title>
        <link rel="stylesheet" href="./mokepon.css"/>
        <link rel="icon" type="image/jpg" href="../../../assets/img/icons/01-mi-yo-creado-por-paint.jpg"/>
    </head>
    <body>
        <section id="seleccionar-mascota">
            <h1 class="titulo">Mokepon</h1>
            <h2 class="subtitulo">Elige a tu mascota:</h2>

            <div id='contenedorTarjetas' class="tarjetas">
                          
            </div>    

            <button id="boton-seleccionar">Seleccionar</button>

            <a href="../../../index.html" id="btn-home">Home</a>
        </section>

        <section id="seleccionar-ataque">
            <h1 class="titulo">Mokepon</h1>

            <h2 class="subtitulo">Elige tu ataque:</h2>
            
            <div id="contenedorAtaques" class="tarjetas-ataques">
            </div>

            <div id="mensajes">
                <p id="resultado">Mucha suerte</p>

                <section id='section-reiniciar'>
                    <button id="reiniciar">Reiniciar</button>
                </section>
            </div>    

            <div class="ataques">
                <div class="ataques-jugador">
                    <p id='vidas-jugador'>🤍🤍🤍</p>
                    <p id="mascota-jugador"></p></p> 
                    <div id="ataques-del-jugador"></div>
                </div>
                <div class="ataques-enemigo">
                    <p id='vidas-enemigo'>🖤🖤🖤</p>
                    <p id="mascota-enemigo"></p></p> 
                    <div id="ataques-del-enemigo"></div>
                </div>               
            </div>           
        </section>
        <script src="./mokepon.js"></script>        
    </body>
</html>
